<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vinova · Pilates</title>
<meta name="description" content="Book a Pilates class with Vinova across Los Angeles." />

<!-- Open Graph: makes the link preview look nice when shared -->
<meta property="og:title" content="Vinova · Pilates" />
<meta property="og:description" content="Book a class with me across Los Angeles." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet" />

<style>
  :root {
    --cream:       #f7f1e3;  /* paper background */
    --card:        #fdfaf3;  /* solid card over the pattern */
    --ink:         #5b4636;  /* warm brown text */
    --muted:       #8a7a66;  /* muted taupe-brown */
    --brown-line:  #6b5238;  /* dark brown hairline */
    --sage:        #93a173;  /* soft sage accent */
    --sage-deep:   #6e7d52;  /* deeper sage for meta / hover */
    --line:        #e6ddcb;  /* card border */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    background-color: var(--cream);
    /* soft sage vertical stripes */
    background-image: repeating-linear-gradient(
      90deg,
      transparent 0 40px,
      rgba(147, 161, 115, 0.28) 40px 52px
    );
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 54px 22px 44px;
    -webkit-font-smoothing: antialiased;
  }

  /* scattered floral layer, sits above stripes, below content */
  .floral-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  /* ---- Header ---- */
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 46px;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 14px;
    text-shadow: 0 1px 10px rgba(247, 241, 227, 0.9);
  }

  .tagline {
    font-size: 11.5px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* thin dark-brown divider */
  .divider {
    width: 46px;
    height: 1px;
    background: var(--brown-line);
    margin: 24px auto 18px;
    opacity: 0.7;
  }

  .script {
    font-family: 'Parisienne', cursive;
    font-size: 32px;
    color: var(--sage-deep);
    line-height: 1;
    margin-bottom: 26px;
  }

  /* ---- Buttons ---- */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link {
    display: block;
    text-decoration: none;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 17px 20px;
    transition: transform .18s ease, box-shadow .18s ease,
                border-color .18s ease, background .18s ease;
    box-shadow: 0 1px 2px rgba(90,80,60,0.05);
  }

  .link:hover, .link:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(90,80,60,0.12);
    border-color: var(--sage);
    background: #ffffff;
    outline: none;
  }

  .link .studio {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .link .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--sage-deep);
  }

  .link .meta .dot { color: var(--muted); }

  /* ---- Footer / Instagram ---- */
  .footer { margin-top: 38px; }

  .ig {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.12em;
    transition: color .18s ease;
  }
  .ig:hover { color: var(--sage-deep); }
  .ig svg { width: 17px; height: 17px; }

  .credit {
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #b9ac95;
  }
</style>
</head>
<body>
  <!-- Soft scattered rosebuds (tiled SVG pattern) -->
  <svg class="floral-bg" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" aria-hidden="true">
    <defs>
      <pattern id="buds" width="150" height="138" patternUnits="userSpaceOnUse">
        <!-- bud 1 -->
        <g transform="translate(34,40) rotate(10)">
          <ellipse cx="-4" cy="9" rx="2.6" ry="5.4" fill="#8a9a6f" transform="rotate(-32 -4 9)"/>
          <ellipse cx="4" cy="9" rx="2.6" ry="5.4" fill="#9caf7e" transform="rotate(32 4 9)"/>
          <circle cx="-2.2" cy="0.5" r="2.9" fill="#e6b0b8"/>
          <circle cx="2.2" cy="0.5" r="2.9" fill="#eec1c7"/>
          <circle cx="0" cy="-2" r="2.6" fill="#df9fa9"/>
        </g>
        <!-- bud 2 -->
        <g transform="translate(112,98) rotate(-14)">
          <ellipse cx="-4" cy="9" rx="2.6" ry="5.4" fill="#9caf7e" transform="rotate(-32 -4 9)"/>
          <ellipse cx="4" cy="9" rx="2.6" ry="5.4" fill="#8a9a6f" transform="rotate(32 4 9)"/>
          <circle cx="-2.2" cy="0.5" r="2.9" fill="#eec1c7"/>
          <circle cx="2.2" cy="0.5" r="2.9" fill="#e6b0b8"/>
          <circle cx="0" cy="-2" r="2.6" fill="#df9fa9"/>
        </g>
        <!-- tiny single bud -->
        <g transform="translate(120,30) rotate(6)">
          <ellipse cx="0" cy="6" rx="2.2" ry="4.4" fill="#93a173" transform="rotate(18 0 6)"/>
          <circle cx="0" cy="0" r="2.7" fill="#e6b0b8"/>
        </g>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#buds)"/>
  </svg>

  <main class="page">
    <h1>Vinova</h1>
    <p class="tagline">Certified Pilates Instructor</p>

    <div class="divider"></div>
    <p class="script">Book with me</p>

    <nav class="links">
      <a class="link" href="https://classpass.com/studios/briiomare-beverly-hills" target="_blank" rel="noopener">
        <div class="studio">Briiomare</div>
        <div class="meta">Beverly Hills <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://www.commongroundpilates.net/schedule-west-adams-studio" target="_blank" rel="noopener">
        <div class="studio">Common Ground Pilates</div>
        <div class="meta">West Adams <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://www.commongroundpilates.net/pilates-studio-mid-city#schedule-mid-city" target="_blank" rel="noopener">
        <div class="studio">Common Ground Pilates</div>
        <div class="meta">Mid City <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://reformpilateswestwood.com/" target="_blank" rel="noopener">
        <div class="studio">Reform Pilates</div>
        <div class="meta">Westwood <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://reformpilates.la/" target="_blank" rel="noopener">
        <div class="studio">Reform Pilates</div>
        <div class="meta">West Hollywood <span class="dot">·</span> Book</div>
      </a>
    </nav>

    <div class="footer">
      <a class="ig" href="https://instagram.com/vinova.deniz" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" />
          <circle cx="12" cy="12" r="4.2" />
          <circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none" />
        </svg>
        @vinova.deniz
      </a>
      <p class="credit">Los Angeles · Reformer &amp; Mat</p>
    </div>
  </main>
</body>
</html>
