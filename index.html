<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vinova · Pilates</title>
<meta name="description" content="Book a Pilates class with Vinova across Los Angeles." />

<!-- Open Graph: makes the link preview look nice when shared -->
<meta property="og:title" content="Vinova · Pilates" />
<meta property="og:description" content="Book a class with me across Los Angeles." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --sand:        #efe7da;  /* warm limestone background */
    --sand-deep:   #e4d8c6;  /* gradient base */
    --card:        #fbf8f2;  /* soft off-white card */
    --ink:         #3a3a36;  /* soft charcoal text */
    --muted:       #8c857a;  /* muted taupe */
    --sea:         #6f9794;  /* muted mediterranean teal */
    --sea-deep:    #557a77;  /* deeper teal for hover */
    --line:        #e3dacb;  /* hairline border */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    background: linear-gradient(170deg, var(--sand) 0%, var(--sand-deep) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 56px 22px 40px;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  /* ---- Monogram ---- */
  .monogram {
    width: 74px;
    height: 74px;
    margin: 0 auto 22px;
    border-radius: 50%;
    border: 1px solid var(--sea);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    color: var(--sea-deep);
    background: rgba(255,255,255,0.35);
  }

  /* ---- Header ---- */
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 42px;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 12px;
  }

  .tagline {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
  }

  .section-label {
    font-size: 10.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 6px 0 18px;
  }

  /* ---- Buttons ---- */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link {
    display: block;
    text-decoration: none;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 17px 20px;
    transition: transform .18s ease, box-shadow .18s ease,
                border-color .18s ease, background .18s ease;
    box-shadow: 0 1px 2px rgba(90,80,60,0.04);
  }

  .link:hover, .link:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(90,80,60,0.10);
    border-color: var(--sea);
    background: #ffffff;
    outline: none;
  }

  .link .studio {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .link .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--sea-deep);
  }

  .link .meta .dot { color: var(--muted); }

  /* ---- Footer / Instagram ---- */
  .footer {
    margin-top: 38px;
  }

  .ig {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.12em;
    transition: color .18s ease;
  }
  .ig:hover { color: var(--sea-deep); }
  .ig svg { width: 17px; height: 17px; }

  .credit {
    margin-top: 26px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #b6ab98;
  }
</style>
</head>
<body>
  <main class="page">
    <div class="monogram">V</div>
    <h1>Vinova</h1>
    <p class="tagline">Pilates Instructor · Los Angeles</p>

    <p class="section-label">Book a class with me</p>

    <nav class="links">
      <a class="link" href="https://classpass.com/studios/briiomare-beverly-hills" target="_blank" rel="noopener">
        <div class="studio">Briiomare</div>
        <div class="meta">Beverly Hills <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://www.commongroundpilates.net/schedule-west-adams-studio" target="_blank" rel="noopener">
        <div class="studio">Common Ground Pilates</div>
        <div class="meta">West Adams <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://www.commongroundpilates.net/pilates-studio-mid-city#schedule-mid-city" target="_blank" rel="noopener">
        <div class="studio">Common Ground Pilates</div>
        <div class="meta">Mid City <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://reformpilateswestwood.com/" target="_blank" rel="noopener">
        <div class="studio">Reform Pilates</div>
        <div class="meta">Westwood <span class="dot">·</span> Book</div>
      </a>

      <a class="link" href="https://reformpilates.la/" target="_blank" rel="noopener">
        <div class="studio">Reform Pilates</div>
        <div class="meta">West Hollywood <span class="dot">·</span> Book</div>
      </a>
    </nav>

    <div class="footer">
      <a class="ig" href="https://instagram.com/vinova.deniz" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" />
          <circle cx="12" cy="12" r="4.2" />
          <circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none" />
        </svg>
        @vinova.deniz
      </a>
      <p class="credit">Los Angeles · Reformer &amp; Mat</p>
    </div>
  </main>
</body>
</html>
